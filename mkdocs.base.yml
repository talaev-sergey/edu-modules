# Общий базовый конфиг для всех модулей.
# Подключается из modules/<name>/mkdocs.yml через `INHERIT: ../../mkdocs.base.yml`.
# Относительные пути (custom_dir, hooks) резолвятся MkDocs относительно
# дочернего mkdocs.yml, поэтому ../../ всегда указывает в корень репозитория.
# В модуле задаётся только: site_name и nav.
# site_url подставляется автоматически из переменной SITE_URL на этапе сборки
# (см. build.sh): https://talaev-sergey.github.io/edu-modules/<name>/. Локально,
# при `mkdocs serve` без этой переменной, остаётся пустым — это нормально.
site_url: !ENV [SITE_URL, '']

theme:
  name: material
  custom_dir: ../../theme
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  language: ru
  font:
    text: Rubik
  features:
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - search.highlight
    - toc.follow

plugins:
  - search
  - meta
  - glightbox   # клик-зум картинок (в т.ч. внутри !!! slide)

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

hooks:
  - ../../theme/hooks.py

extra_css:
  - stylesheets/extra.css
