site_url: !ENV [SITE_URL, '']

theme:
  name: material
  custom_dir: ../../theme
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  language: ru
  font:
    text: Rubik
  features:
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - search.highlight
    - toc.follow

plugins:
  - search
  - meta
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

hooks:
  - ../../theme/hooks.py

extra_css:
  - stylesheets/extra.css
