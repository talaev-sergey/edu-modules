INHERIT: ../../mkdocs.base.yml

# ── Заменить под свой модуль ──
# Задайте только site_name. site_url НЕ указывайте — он подставляется
# автоматически при сборке (build.sh → SITE_URL) из имени папки модуля:
# https://talaev-sergey.github.io/edu-modules/<имя-папки>/
site_name: "[Название модуля]"

nav:
  - Главная: index.md
  - Подготовка к модулю: preparation.md
  - Уроки:
      - 1 урок: lessons/lesson_01.md
  - Домашняя работа: homework.md
  - Контрольная работа: test.md
  - Материалы урока: materials.md
