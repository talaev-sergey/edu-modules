<!DOCTYPE html>


<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Интерактив — шаблон</title>
<style>
  :root {
    --ctp-base:     #eff1f5;
    --ctp-mantle:   #e6e9ef;
    --ctp-crust:    #dce0e8;
    --ctp-surface0: #ccd0da;
    --ctp-surface1: #bcc0cc;

    --c-bg:        var(--ctp-crust);
    --c-panel:     var(--ctp-base);
    --c-panel-2:   var(--ctp-base);
    --c-card:      var(--ctp-mantle);
    --c-border:    var(--ctp-surface0);
    --c-fg:        #4c4f69;
    --c-muted:     #6c6f85;
    --c-blue:      #1e66f5;
    --c-green:     #40a02b;
    --c-orange:    #fe640b;
    --c-red:       #d20f39;
    --c-purple:      #ED9F76;
    --c-purple-text: #B5651D;
    --c-on-accent: #eff1f5;
    --radius:      14px;
    --mono:        "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    --sans:        "Rubik", system-ui, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, var(--ctp-mantle) 0%, var(--c-bg) 55%);
    color: var(--c-fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    gap: 18px;
    height: 100vh;
    padding: 18px;
  }

  .app__head {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  .app__title {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--c-blue);
    letter-spacing: .2px;
  }
  .app__subtitle { margin: 0; color: var(--c-muted); font-size: .95rem; }

  .panel {
    background: var(--c-panel);
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel__group-title {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--c-muted);
    margin: 8px 2px 2px;
  }

  .btn {
    appearance: none;
    border: 1px solid var(--c-border);
    background: var(--ctp-surface0);
    color: var(--c-fg);
    font-family: var(--sans);
    font-size: .92rem;
    font-weight: 500;
    padding: 11px 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 9px;
    transition: transform .08s ease, background .15s ease, border-color .15s ease, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: var(--ctp-surface1); border-color: var(--ctp-surface1); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn--primary  { background: var(--c-blue);   border-color: transparent; color: var(--c-on-accent); font-weight: 600; }
  .btn--primary:hover:not(:disabled)  { filter: brightness(1.06); background: var(--c-blue); }
  .btn--commit   { background: var(--c-green);  border-color: transparent; color: var(--c-on-accent); font-weight: 600; }
  .btn--commit:hover:not(:disabled)   { filter: brightness(1.06); background: var(--c-green); }
  .btn--danger   { color: var(--c-red); }
  .btn--ghost    { background: transparent; }
  .btn__key { margin-left: auto; font-family: var(--mono); font-size: .72rem; color: var(--c-muted); }

  .stage {
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
    background: var(--c-panel-2);
    padding: 16px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .term {
    background: var(--ctp-mantle);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 1rem;
    line-height: 1.6;
    padding: 12px 14px;
    color: var(--c-fg);
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .term__head { color: var(--c-muted); font-size: .68rem; letter-spacing: 1.5px; margin-bottom: 6px; }
  .term .cmd  { color: var(--c-green); }
  .term .err  { color: var(--c-red); }
  .term .dim  { color: var(--c-muted); }
  .term .ok   { color: var(--c-blue); }

  .chip {
    font-family: var(--mono);
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 6px;
    border: 1px solid currentColor;
  }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--ctp-surface1); border-radius: 6px; }

  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height: auto; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="app__head">
      <h1 class="app__title">🌱 Интерактив — шаблон</h1>
      <p class="app__subtitle">Короткое пояснение, что показывает этот интерактив.</p>
    </header>

    <aside class="panel" id="panel">
      <div class="panel__group-title">Управление</div>
      <button class="btn btn--primary">Пример кнопки</button>
    </aside>

    <main class="stage">
      <section id="scene"></section>
      <div class="term" id="term">
        <div class="term__head">GIT BASH</div>
      </div>
    </main>
  </div>

<script>
  const term = (() => {
    const el = document.getElementById('term');
    return (html) => {
      const line = document.createElement('div');
      line.innerHTML = html;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    };
  })();

  term('<span class="dim">$ </span><span class="cmd">echo</span> "шаблон готов"');
</script>
</body>
</html>
