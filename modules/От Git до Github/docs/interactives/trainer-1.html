<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Git: жизненный цикл файла — git init, add, commit</title>
<style>
  :root {
    --ctp-base:     #eff1f5;
    --ctp-mantle:   #e6e9ef;
    --ctp-crust:    #dce0e8;
    --ctp-surface0: #ccd0da;
    --ctp-surface1: #bcc0cc;

    --c-bg:        var(--ctp-crust);
    --c-panel:     var(--ctp-base);
    --c-panel-2:   var(--ctp-base);
    --c-card:      var(--ctp-mantle);
    --c-border:    var(--ctp-surface0);
    --c-fg:        #4c4f69;
    --c-muted:     #6c6f85;
    --c-blue:      #1e66f5;
    --c-green:     #40a02b;
    --c-orange:    #fe640b;
    --c-red:       #d20f39;
    --c-purple:      #ED9F76;
    --c-purple-text: #B5651D;
    --c-on-accent: #eff1f5;
    --radius:      14px;
    --mono:        "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    --sans:        "Rubik", system-ui, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 70% -10%, var(--ctp-mantle) 0%, var(--c-bg) 55%);
    color: var(--c-fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 330px 1fr;
    grid-template-rows: auto 1fr;
    gap: 18px;
    height: 100vh;
    padding: 18px;
  }
  .app__head {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  .app__title { margin: 0; font-size: 1.5rem; font-weight: 600; color: var(--c-blue); }
  .app__title .git-logo { width: 1.3em; height: 1.3em; vertical-align: -0.28em; margin-right: .12em; }

  .panel {
    background: var(--c-panel);
    border: 1px solid var(--c-border);
    border-radius: var(--radius);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .panel__group-title {
    font-size: .72rem; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--c-muted); margin: 10px 2px 2px;
  }

  .btn {
    appearance: none;
    border: 1px solid var(--c-border);
    background: var(--ctp-surface0); color: var(--c-fg);
    font-family: var(--sans); font-size: .9rem; font-weight: 500;
    padding: 10px 13px; border-radius: 10px; cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 9px;
    white-space: nowrap;
    transition: transform .08s, background .15s, border-color .15s, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: var(--ctp-surface1); border-color: var(--ctp-surface1); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn--init    { background: var(--c-purple); border-color: transparent; color: var(--c-on-accent); font-weight: 600; }
  .btn--add     { background: var(--c-green);  border-color: transparent; color: var(--c-on-accent); font-weight: 600; }
  .btn--commit  { background: var(--c-blue);   border-color: transparent; color: var(--c-on-accent); font-weight: 600; }
  .btn--init:hover:not(:disabled),
  .btn--add:hover:not(:disabled),
  .btn--commit:hover:not(:disabled) { filter: brightness(1.06); }
  .btn--danger  { color: var(--c-red); }
  .btn .ic { font-size: 1rem; line-height: 1; }
  .btn__hint { margin-left: auto; font-family: var(--mono); font-size: .68rem; color: var(--c-muted); }
  .btn--init  .btn__hint, .btn--add .btn__hint, .btn--commit .btn__hint { color: rgba(255,255,255,.8); }

  .stage {
    border: 1px solid var(--c-border); border-radius: var(--radius);
    background: var(--c-panel-2); padding: 16px;
    overflow: auto; display: flex; flex-direction: column; gap: 14px;
  }

  .zones { display: grid; grid-template-columns: 1fr; gap: 12px; align-items: stretch; }
  .zones--repo { grid-template-columns: 320px max-content; }

  .gitbox {
    border: 1.5px dashed var(--c-purple);
    border-radius: 14px;
    padding: 10px 12px 12px;
    background: color-mix(in srgb, var(--c-purple) 9%, var(--ctp-base));
    display: flex; flex-direction: column; gap: 8px;
  }
  .gitbox__label {
    font-family: var(--mono); font-size: .76rem; color: var(--c-purple-text); font-weight: 600;
    letter-spacing: .3px;
  }
  .gitbox__zones { display: grid; grid-template-columns: 260px minmax(320px, max-content); gap: 12px; flex: 1; }
  .zone {
    border: 1.5px dashed var(--ctp-surface1);
    border-radius: 12px; padding: 12px; min-height: 230px;
    display: flex; flex-direction: column; gap: 9px;
    background: color-mix(in srgb, var(--ctp-mantle) 45%, transparent);
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .zone--flash { border-color: var(--zc); box-shadow: 0 0 0 2px color-mix(in srgb, var(--zc) 35%, transparent) inset; }
  .zone__head { display: flex; align-items: center; gap: 8px; }
  .zone__icon { font-size: 1.15rem; }
  .zone__title { font-weight: 600; font-size: .98rem; }
  .zone__sub  { font-family: var(--mono); font-size: .68rem; color: var(--c-muted); }
  .zone--work { --zc: var(--c-red); }
  .zone--index{ --zc: var(--c-green); }
  .zone--repo { --zc: var(--c-blue); }
  .zone__count {
    margin-left: auto; font-family: var(--mono); font-size: .7rem;
    color: var(--c-muted); border: 1px solid var(--c-border);
    border-radius: 999px; padding: 1px 8px;
  }
  .zone__body { display: flex; flex-direction: column; gap: 7px; }
  .zone__empty { color: var(--c-muted); font-size: .8rem; font-style: italic; margin-top: 6px; }

  .file {
    display: flex; align-items: center; gap: 8px;
    background: var(--ctp-base); border: 1px solid var(--c-border);
    border-left: 4px solid var(--fc, var(--c-muted));
    border-radius: 8px; padding: 7px 9px;
    animation: pop .22s ease;
  }
  @keyframes pop { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .file__name { font-family: var(--mono); font-size: .82rem; }
  .file__tag  {
    margin-left: auto; font-size: .64rem; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: .5px; color: var(--fc);
  }
  .file--plain     { --fc: var(--c-muted); }
  .file--clean     { --fc: var(--c-blue); }
  .file--untracked { --fc: var(--c-red); }
  .file--modified  { --fc: var(--c-orange); }
  .file--staged    { --fc: var(--c-green); }
  .file--deleted    { --fc: var(--c-red); }
  .file--staged-del { --fc: var(--c-green); }
  .file--deleted .file__name,
  .file--staged-del .file__name { text-decoration: line-through; opacity: .8; }
  .file--dim { opacity: .5; }

  .gitdir {
    display: flex; align-items: center; gap: 8px;
    background: color-mix(in srgb, var(--c-purple) 12%, var(--ctp-base));
    border: 1px dashed var(--c-purple);
    border-radius: 8px; padding: 7px 9px; margin-bottom: 4px;
    animation: pop .22s ease;
  }
  .gitdir__name { font-family: var(--mono); font-size: .82rem; color: var(--c-purple-text); font-weight: 600; }
  .gitdir__tag  { margin-left: auto; font-size: .62rem; font-family: var(--mono); color: var(--c-muted); }


  .commit {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--ctp-base); border: 1px solid var(--c-border);
    border-radius: 8px; padding: 6px 9px; animation: pop .22s ease;
  }
  .commit__dot { width: 10px; height: 10px; border-radius: 50%; background: var(--c-blue); box-shadow: 0 0 6px color-mix(in srgb, var(--c-blue) 50%, transparent); flex: none; margin-top: 4px; }
  .commit__main { display: flex; flex-direction: column; gap: 2px; }
  .commit__hash { font-family: var(--mono); font-size: .72rem; color: var(--c-blue); }
  .commit__msg  { font-size: .78rem; color: var(--c-fg); white-space: nowrap; }
  .commit__author { font-size: .68rem; color: var(--c-muted); white-space: nowrap; }

  .cfg {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border: 1px solid var(--c-border); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 4px;
  }
  .cfg--off { background: color-mix(in srgb, var(--c-red) 9%, var(--ctp-base)); border-color: color-mix(in srgb, var(--c-red) 40%, var(--c-border)); }
  .cfg--on  { background: color-mix(in srgb, var(--c-green) 9%, var(--ctp-base)); border-color: color-mix(in srgb, var(--c-green) 35%, var(--c-border)); }
  .cfg__id { font-size: .76rem; line-height: 1.4; white-space: nowrap; }
  .cfg__id b { font-family: var(--mono); font-weight: 600; }
  .cfg--off .cfg__id { color: var(--c-red); }
  .cfg__btn {
    margin-left: auto; appearance: none; cursor: pointer;
    font-family: var(--sans); font-size: .78rem; font-weight: 600;
    padding: 6px 11px; border-radius: 8px; white-space: nowrap;
    border: 1px solid transparent; background: var(--c-blue); color: var(--c-on-accent);
    transition: filter .15s;
  }
  .cfg__btn:hover { filter: brightness(1.06); }
  .cfg--on .cfg__btn { background: var(--ctp-surface0); color: var(--c-fg); border-color: var(--c-border); }

  .term {
    background: var(--ctp-mantle); border: 1px solid var(--c-border); border-radius: 10px;
    font-family: var(--mono); font-size: 1rem; line-height: 1.6;
    padding: 12px 14px; color: var(--c-fg);
    flex: 1; min-height: 120px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .term__head { color: var(--c-muted); font-size: .66rem; letter-spacing: 1.5px; margin-bottom: 6px; }
  .term .cmd { color: var(--c-green); }
  .term .err { color: var(--c-red); }
  .term .dim { color: var(--c-muted); }
  .term .ok  { color: var(--c-blue); }
  .term .grn { color: var(--c-green); }
  .term .red { color: var(--c-red); }
  .term .hint { display: block; color: var(--c-purple-text); font-style: italic; margin: 2px 0 4px; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--ctp-surface1); border-radius: 6px; }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height: auto; }
    .zones, .zones--repo, .gitbox__zones { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="app__head">
      <h1 class="app__title"><svg class="git-logo" viewBox="0 0 78 78" aria-hidden="true"><path fill="#f03c2e" transform="translate(10 10) rotate(-45 29 29)" d="M5,58c-2.76142,0 -5,-2.23858 -5,-5v-48c0,-2.76142 2.23858,-5 5,-5h33v12.54404c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,0.73514 0.13221,1.43941 0.37415,2.09031l-15.28384,15.28384c-0.6509,-0.24194 -1.35517,-0.37415 -2.09031,-0.37415c-3.31371,0 -6,2.68629 -6,6c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-0.73514 -0.13221,-1.43941 -0.37415,-2.09031l14.87415,-14.87415l0,11.50851c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.08808c2.06553,-0.94801 3.5,-3.03446 3.5,-5.45596c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.54404h10c2.76142,0 5,2.23858 5,5v48c0,2.76142 -2.23858,5 -5,5z"/></svg> Тренажёр — 1 : Жизненный цикл файла в Git</h1>
    </header>

    <aside class="panel" id="panel">
      <div class="panel__group-title">Локальный репозиторий</div>
      <button class="btn btn--init" id="btnInit"><span class="ic">⚡</span> Создать репозиторий <span class="btn__hint">git init</span></button>
      <button class="btn btn--danger" id="btnDeinit" disabled><span class="ic">💥</span> Удалить репозиторий <span class="btn__hint">rm -rf .git</span></button>

      <div class="panel__group-title">Рабочая папка</div>
      <button class="btn" id="btnNew"  disabled><span class="ic">📄</span> Создать файл</button>
      <button class="btn" id="btnEdit" disabled><span class="ic">✏️</span> Изменить файл</button>
      <button class="btn btn--danger" id="btnDel" disabled><span class="ic">🗑️</span> Удалить файл</button>

      <div class="panel__group-title">Сохранение изменений (add → commit)</div>
      <button class="btn btn--add"    id="btnAdd"    disabled><span class="ic">📦</span> Добавить в индекс <span class="btn__hint">git add .</span></button>
      <button class="btn btn--commit" id="btnCommit" disabled><span class="ic">✅</span> Сделать коммит <span class="btn__hint">git commit</span></button>

      <div class="panel__group-title">Посмотреть</div>
      <button class="btn btn--ghost" id="btnStatus" disabled><span class="ic">🔍</span> git status</button>
      <button class="btn btn--ghost" id="btnLog"    disabled><span class="ic">📜</span> git log</button>

      <div style="flex:1"></div>
      <button class="btn btn--danger" id="btnReset"><span class="ic">↺</span> Сбросить всё</button>
    </aside>

    <main class="stage">
      <div class="zones">
        <section class="zone zone--work" id="zoneWork">
          <div class="zone__head">
            <span class="zone__icon">📂</span>
            <div><div class="zone__title">Рабочая папка</div><div class="zone__sub">working directory</div></div>
            <span class="zone__count" id="cntWork">0</span>
          </div>
          <div class="zone__body" id="bodyWork"></div>
        </section>

        <div class="gitbox" id="gitBox">
          <div class="gitbox__label">📁 Папка .git/ — внутренняя кухня Git</div>
          <div class="gitbox__zones">
            <section class="zone zone--index" id="zoneIndex">
              <div class="zone__head">
                <span class="zone__icon">📦</span>
                <div><div class="zone__title">Индекс</div><div class="zone__sub">staging area</div></div>
                <span class="zone__count" id="cntIndex">0</span>
              </div>
              <div class="zone__body" id="bodyIndex"></div>
            </section>

            <section class="zone zone--repo" id="zoneRepo">
              <div class="zone__head">
                <span class="zone__icon">🗄️</span>
                <div><div class="zone__title">Локальный репозиторий</div><div class="zone__sub">local repository</div></div>
                <span class="zone__count" id="cntRepo">0</span>
              </div>
              <div class="cfg" id="cfgCard">
                <div class="cfg__id" id="cfgId"></div>
                <button class="cfg__btn" id="btnConfig"></button>
              </div>
              <div class="zone__body" id="bodyRepo"></div>
            </section>
          </div>
        </div>
      </div>
      <div class="term" id="term"><div class="term__head">GIT BASH</div></div>
    </main>
  </div>

<script>
(() => {
  let repo = false;
  let files = [];
  let commits = [];
  let fileSeq = 0;
  let config = null;

  const NAMES = ['about.txt', 'readme.md', 'index.html', 'notes.txt', 'main.py', 'style.css'];

  const IDENTS = [
    { name: 'Ivan Petrov',    email: 'ivan.petrov@example.com' },
    { name: 'Maria Ivanova',  email: 'maria.ivanova@mail.ru' },
    { name: 'Alex Smirnov',   email: 'alex.smirnov@gmail.com' },
    { name: 'Olga Kuzmina',   email: 'olga.kuzmina@yandex.ru' },
    { name: 'Dmitry Sokolov', email: 'd.sokolov@example.com' },
    { name: 'Kate Popova',    email: 'kate.popova@mail.ru' },
    { name: 'Pavel Orlov',    email: 'pavel.orlov@gmail.com' },
    { name: 'Lena Morozova',  email: 'lena.morozova@yandex.ru' },
  ];

  const $ = id => document.getElementById(id);
  const termEl = $('term');

  function term(html) {
    const line = document.createElement('div');
    line.innerHTML = html;
    termEl.appendChild(line);
    termEl.scrollTop = termEl.scrollHeight;
  }
  function cmd(text) { term(`<span class="dim">$ </span><span class="cmd">${text}</span>`); }
  function hint(text) { term(`<span class="hint">💡 ${text}</span>`); }

  function flash(zoneId) {
    const z = $(zoneId);
    z.classList.add('zone--flash');
    setTimeout(() => z.classList.remove('zone--flash'), 450);
  }

  function render() {
    const WORK_RANK = { untracked: 0, modified: 0, deleted: 0, plain: 0, staged: 1, clean: 2 };
    const inWork  = files
      .filter(f => f.state in WORK_RANK)
      .sort((a, b) => WORK_RANK[a.state] - WORK_RANK[b.state]);
    const inIndex = stagedFiles();

    renderFiles('bodyWork', inWork, true);
    renderGitDir();
    renderFiles('bodyIndex', inIndex, false);
    renderConfig();
    renderCommits();

    $('cntWork').textContent  = inWork.length;
    $('cntIndex').textContent = inIndex.length;
    $('cntRepo').textContent  = commits.length;

    $('gitBox').style.display = repo ? '' : 'none';
    document.querySelector('.zones').classList.toggle('zones--repo', repo);

    $('btnInit').disabled   = repo;
    $('btnDeinit').disabled = !repo;
    $('btnNew').disabled    = false;
    const hasStaged = inIndex.length > 0;
    const hasUnstaged = files.some(f => f.state === 'untracked' || f.state === 'modified' || f.state === 'deleted');
    $('btnEdit').disabled   = activeFiles().length === 0;
    $('btnDel').disabled    = activeFiles().length === 0;
    $('btnAdd').disabled    = !repo || !hasUnstaged;
    $('btnCommit').disabled = !repo || !hasStaged;
    $('btnStatus').disabled = !repo;
    $('btnLog').disabled    = !repo;
  }

  function renderFiles(bodyId, list, work) {
    const body = $(bodyId);
    body.innerHTML = '';
    if (!list.length) {
      const e = document.createElement('div');
      e.className = 'zone__empty';
      e.textContent = work ? 'пусто — создайте файл' : 'пусто — нечего коммитить';
      body.appendChild(e);
      return;
    }
    for (const f of list) {
      let cls, icon, tag;
      if (work) {
        const map = {
          plain:     ['file--plain',     '📄', 'файл'],
          untracked: ['file--untracked', '📄', 'new'],
          modified:  ['file--modified',  '📄', 'modified'],
          deleted:   ['file--deleted',   '🗑️', 'deleted'],
          staged:    ['file--staged file--dim', '📄', 'в индексе'],
          clean:     ['file--clean file--dim',  '📄', 'сохранён'],
        };
        [cls, icon, tag] = map[f.state];
      } else {
        if (f.state === 'staged-del') [cls, icon, tag] = ['file--staged-del', '🗑️', 'deleted'];
        else                          [cls, icon, tag] = ['file--staged', '📦', 'staged'];
      }
      const el = document.createElement('div');
      el.className = `file ${cls}`;
      el.innerHTML = `<span>${icon}</span>
        <span class="file__name">${f.name}</span>
        <span class="file__tag">${tag}</span>`;
      body.appendChild(el);
    }
  }

  function renderGitDir() {
    if (!repo) return;
    const body = $('bodyWork');
    const el = document.createElement('div');
    el.className = 'gitdir';
    el.innerHTML = `<span>📁</span>
      <span class="gitdir__name">.git/</span>
      <span class="gitdir__tag">служебная папка</span>`;
    body.insertBefore(el, body.firstChild);
  }

  function renderConfig() {
    const id = $('cfgId'), btn = $('btnConfig'), card = $('cfgCard');
    if (config) {
      card.className = 'cfg cfg--on';
      id.innerHTML = `👤 <b>${config.name}</b><br>✉️ <b>${config.email}</b>`;
      btn.textContent = 'Изменить';
    } else {
      card.className = 'cfg cfg--off';
      id.textContent = '⚠️ Автор не настроен — коммит не пройдёт';
      btn.textContent = 'Настроить (git config)';
    }
  }

  function renderCommits() {
    const body = $('bodyRepo');
    body.innerHTML = '';
    if (!commits.length) {
      const e = document.createElement('div');
      e.className = 'zone__empty';
      e.textContent = repo ? 'нет коммитов' : 'нет репозитория';
      body.appendChild(e);
      return;
    }
    [...commits].reverse().forEach(c => {
      const el = document.createElement('div');
      el.className = 'commit';
      el.innerHTML = `<span class="commit__dot"></span>
        <div class="commit__main">
          <div><span class="commit__hash">${c.hash}</span> <span class="commit__msg">${c.message}</span></div>
          <div class="commit__author">👤 ${c.author}</div>
        </div>`;
      body.appendChild(el);
    });
  }

  function hash() { return Math.random().toString(16).slice(2, 9); }
  function activeFiles() { return files.filter(f => f.state !== 'deleted' && f.state !== 'staged-del'); }
  function stagedFiles() { return files.filter(f => f.state === 'staged' || f.state === 'staged-del'); }

  $('btnInit').onclick = () => {
    repo = true;
    cmd('git init');
    term('<span class="ok">Initialized empty Git repository in ./.git/</span>');
    hint('В папке появилась служебная папка <span class="ok">.git/</span> — Git начал следить за изменениями.');
    const seen = files.filter(f => f.state === 'plain');
    seen.forEach(f => { f.state = 'untracked'; });
    if (seen.length) hint(`Существующие файлы Git увидел как <span class="red">untracked</span>: <span class="red">${seen.map(f => f.name).join(', ')}</span>`);
    render();
  };

  $('btnDeinit').onclick = () => {
    repo = false;
    commits = [];
    files = activeFiles().map(f => ({ ...f, tracked: false, state: 'plain' }));
    cmd('rm -rf .git');
    hint('Папка <span class="red">.git/</span> удалена — это снова обычная папка, а не репозиторий. Файлы остались, история коммитов пропала.');
    flash('zoneWork');
    render();
  };

  $('btnNew').onclick = () => {
    const used = files.map(f => f.name);
    const name = NAMES.find(n => !used.includes(n)) || `file${++fileSeq}.txt`;
    files.push({ name, tracked: false, state: repo ? 'untracked' : 'plain' });
    cmd(`touch ${name}`);
    if (repo) hint(`Создан новый файл <span class="red">${name}</span> (untracked — Git его ещё не отслеживает).`);
    else      hint(`Создан файл ${name} в обычной папке — репозитория ещё нет.`);
    flash('zoneWork');
    render();
  };

  $('btnEdit').onclick = () => {
    const f = files.find(x => x.state === 'clean')
           || files.find(x => x.state === 'untracked')
           || files.find(x => x.state === 'plain')
           || files.find(x => x.state === 'modified' || x.state === 'staged');
    if (!f) return;
    cmd(`echo "новая строка" >> ${f.name}`);
    if (f.state === 'plain') {
      hint(`Файл ${f.name} изменён. Репозитория нет — Git за ним не следит.`);
    } else if (f.state === 'untracked') {
      hint(`Файл <span class="red">${f.name}</span> изменён (всё ещё untracked).`);
    } else {
      f.state = 'modified';
      hint(`Файл <span class="red">${f.name}</span> изменён — правки в рабочей папке, не в индексе.`);
    }
    flash('zoneWork');
    render();
  };

  $('btnDel').onclick = () => {
    const f = activeFiles().slice(-1)[0];
    if (!f) return;
    cmd(`rm ${f.name}`);
    if (f.tracked) {
      f.state = 'deleted';
      hint(`Файл <span class="red">${f.name}</span> удалён с диска. Это изменение: чтобы зафиксировать удаление, нужно <span class="grn">git add</span> и <span class="ok">git commit</span>.`);
    } else {
      files = files.filter(x => x !== f);
      if (repo) hint(`Файл <span class="red">${f.name}</span> удалён. Он не был в репозитории (untracked), поэтому для Git ничего не изменилось.`);
      else      hint(`Файл ${f.name} удалён из папки.`);
    }
    flash('zoneWork');
    render();
  };

  $('btnAdd').onclick = () => {
    const added = [], removed = [];
    files.forEach(f => {
      if (f.state === 'untracked' || f.state === 'modified') { f.state = 'staged'; added.push(f.name); }
      else if (f.state === 'deleted') { f.state = 'staged-del'; removed.push(f.name); }
    });
    cmd('git add .');
    if (added.length)   hint(`В индекс добавлено: <span class="grn">${added.join(', ')}</span> — готово к коммиту.`);
    if (removed.length) hint(`В индекс добавлено удаление: <span class="grn">${removed.join(', ')}</span> — готово к коммиту.`);
    if (added.length || removed.length) flash('zoneIndex');
    render();
  };

  $('btnConfig').onclick = () => {
    let id;
    do { id = IDENTS[Math.floor(Math.random() * IDENTS.length)]; }
    while (config && id.name === config.name);
    const first = !config;
    config = { ...id };
    cmd(`git config --global user.name "${config.name}"`);
    cmd(`git config --global user.email "${config.email}"`);
    hint(`${first ? 'Git настроен' : 'Данные обновлены'}: теперь Git подписывает коммиты как <span class="ok">${config.name} &lt;${config.email}&gt;</span>.`);
    render();
  };

  $('btnCommit').onclick = () => {
    const staged = stagedFiles();
    if (!staged.length) return;
    const added    = staged.filter(f => f.state === 'staged' && !f.tracked).map(f => f.name);
    const changed  = staged.filter(f => f.state === 'staged' &&  f.tracked).map(f => f.name);
    const removed  = staged.filter(f => f.state === 'staged-del').map(f => f.name);
    const parts = [];
    if (added.length)   parts.push(`добавил ${added.join(', ')}`);
    if (changed.length) parts.push(`изменил ${changed.join(', ')}`);
    if (removed.length) parts.push(`удалил ${removed.join(', ')}`);
    const msg = parts.join('; ');
    cmd(`git commit -m "${msg}"`);

    if (!config) {
      term('<span class="err">*** Please tell me who you are.</span>');
      term('<span class="dim">Run</span>');
      term('  <span class="dim">git config --global user.email "you@example.com"</span>');
      term('  <span class="dim">git config --global user.name "Your Name"</span>');
      term('<span class="err">fatal: unable to auto-detect email address</span>');
      hint('Git не знает, кто автор. Настройте имя и e-mail кнопкой «Настроить» в «Локальном репозитории».');
      flash('zoneRepo');
      render();
      return;
    }

    const h = hash();
    commits.push({ hash: h, message: msg, author: `${config.name} <${config.email}>` });
    staged.forEach(f => {
      if (f.state === 'staged-del') files = files.filter(x => x !== f);
      else { f.state = 'clean'; f.tracked = true; }
    });
    term(`<span class="ok">[main ${h}]</span> ${msg}`);
    hint(`Коммит сохранён в репозитории. Автор: <span class="ok">${config.name} &lt;${config.email}&gt;</span>.`);
    flash('zoneRepo');
    render();
  };

  $('btnStatus').onclick = () => {
    cmd('git status');
    const staged      = stagedFiles();
    const notStaged   = files.filter(f => f.state === 'modified' || f.state === 'deleted');
    const untracked   = files.filter(f => f.state === 'untracked');
    term('<span class="dim">On branch main</span>');
    if (!commits.length) term('<span class="dim">No commits yet</span>');
    if (!staged.length && !notStaged.length && !untracked.length) {
      term('<span class="grn">nothing to commit, working tree clean</span>');
      hint('Рабочая папка чистая: все изменения уже сохранены, коммитить нечего.');
      render();
      return;
    }
    if (staged.length) {
      term('<span class="dim">Changes to be committed:</span>');
      staged.forEach(f => {
        const label = f.state === 'staged-del' ? 'deleted:    ' : (f.tracked ? 'modified:   ' : 'new file:   ');
        term(`   <span class="grn">${label}${f.name}</span>`);
      });
    }
    if (notStaged.length) {
      term('<span class="dim">Changes not staged for commit:</span>');
      notStaged.forEach(f => {
        const label = f.state === 'deleted' ? 'deleted:    ' : 'modified:   ';
        term(`   <span class="red">${label}${f.name}</span>`);
      });
    }
    if (untracked.length) {
      term('<span class="dim">Untracked files:</span>');
      untracked.forEach(f => term(`   <span class="red">${f.name}</span>`));
    }
    if (staged.length && !notStaged.length && !untracked.length) {
      hint('Зелёное — уже в индексе и готово к сохранению. Делайте git commit.');
    } else if (staged.length) {
      hint('Зелёное — в индексе (готово к git commit). Красное — ещё не добавлено, нужен git add.');
    } else {
      hint('Красное — изменения ещё не в индексе. Добавьте их командой git add.');
    }
    render();
  };

  $('btnLog').onclick = () => {
    cmd('git log --oneline');
    if (!commits.length) {
      term('<span class="err">fatal: your current branch \'main\' does not have any commits yet</span>');
      hint('История пуста — сделайте первый коммит: git add, затем git commit.');
      render();
      return;
    }
    [...commits].reverse().forEach(c => term(`<span class="ok">${c.hash}</span> ${c.message}`));
    hint('Это история коммитов, новые сверху. Каждая строка — снимок: короткий хеш и описание.');
    render();
  };

  $('btnReset').onclick = () => {
    repo = false; files = []; commits = []; fileSeq = 0; config = null;
    termEl.innerHTML = '<div class="term__head">GIT BASH</div>';
    hint('Состояние сброшено. Начните с «Создать репозиторий».');
    render();
  };

  hint('Это обычная папка. Можно сразу создавать файлы, а затем превратить её в репозиторий кнопкой «Создать репозиторий» (git init).');
  render();
})();
</script>
</body>
</html>
