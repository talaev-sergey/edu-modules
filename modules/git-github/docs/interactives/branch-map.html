<!DOCTYPE html>
<!--
  СТАТИЧНАЯ СХЕМА: «Мы ушли в ветку feature-power»  (урок 4, теория)
  Источник иллюстрации. Рендерится в docs/assets/images/lesson_04_branch_map.webp.
  Палитра Catppuccin Latte — как в тренажёрах. Подсвечены текущий коммит и ветка.
-->
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
  :root {
    --base:#eff1f5; --mantle:#e6e9ef; --crust:#dce0e8; --surface0:#ccd0da; --surface1:#bcc0cc;
    --fg:#4c4f69; --muted:#6c6f85; --blue:#1e66f5; --green:#40a02b; --orange:#fe640b;
    --mono:"JetBrains Mono","Fira Code",Consolas,monospace;
    --sans:"Rubik",system-ui,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body {
    width:940px; height:400px;
    background:var(--base);
    font-family:var(--sans); color:var(--fg);
    display:flex; flex-direction:column;
  }
  .card { flex:1; margin:14px; border:1px solid var(--surface0); border-radius:16px;
          background:radial-gradient(900px 360px at 75% -20%, var(--mantle) 0%, var(--base) 60%);
          padding:14px 18px 8px; display:flex; flex-direction:column; }
  h2 { margin:2px 4px 0; font-size:1.15rem; font-weight:600; color:var(--blue); }
  .legend { margin:4px 4px 0; font-size:.8rem; color:var(--muted); }
  .legend b { color:var(--orange); }
  svg { display:block; margin-top:2px; }

  .lane-lbl { font-family:var(--mono); font-size:14px; font-weight:600; }
  .edge { fill:none; stroke:var(--surface1); stroke-width:3; }
  .node { stroke:var(--base); stroke-width:3; }
  .node-here { stroke:var(--fg); stroke-width:4; }
  .msg { font-family:var(--sans); font-size:12.5px; fill:var(--muted); }
  .hash { font-family:var(--mono); font-size:11px; fill:var(--surface1); }
  .blabel { font-family:var(--mono); font-size:13px; font-weight:600; }
  .here { font-family:var(--sans); font-size:13.5px; font-weight:600; fill:var(--orange); }
</style>
</head>
<body>
  <div class="card">
    <h2>Мы ушли в ветку feature-power</h2>
    <div class="legend">Основная ветка <b>master</b> осталась как была. Новый коммит лёг в отдельную ветку — <b>★ здесь мы сейчас</b> (HEAD).</div>

    <svg width="900" height="300" viewBox="0 0 900 300" aria-label="Граф веток master и feature-power">
      <!-- дорожки -->
      <!-- master: y=110, коммиты x=150,330,510 -->
      <!-- feature-power: y=235, коммит x=640, отходит от master-коммита x=510 -->

      <!-- рёбра master -->
      <path class="edge" d="M150 110 H510"/>
      <!-- ребро ответвления master(510,110) -> feature(640,235) -->
      <path class="edge" d="M510 110 C 590 110, 560 235, 640 235"/>

      <!-- подписи дорожек слева -->
      <text class="lane-lbl" x="20" y="115" fill="#1e66f5">master</text>
      <text class="lane-lbl" x="20" y="240" fill="#fe640b">feature-</text>
      <text class="lane-lbl" x="20" y="258" fill="#fe640b">power</text>

      <!-- узлы master -->
      <circle class="node" cx="150" cy="110" r="14" fill="#1e66f5"/>
      <circle class="node" cx="330" cy="110" r="14" fill="#1e66f5"/>
      <circle class="node" cx="510" cy="110" r="14" fill="#1e66f5"/>
      <text class="msg" x="150" y="78" text-anchor="middle">сложение</text>
      <text class="msg" x="330" y="78" text-anchor="middle">вычитание</text>
      <text class="msg" x="510" y="78" text-anchor="middle">умножение</text>

      <!-- метка ветки master у её вершины -->
      <rect x="468" y="128" width="84" height="22" rx="6" fill="#1e66f5" fill-opacity="0.12" stroke="#1e66f5" stroke-width="1.3"/>
      <text class="blabel" x="478" y="143" fill="#1e66f5">master</text>

      <!-- узел feature (текущий, подсвечен) -->
      <circle cx="640" cy="235" r="22" fill="#fe640b" fill-opacity="0.18"/>
      <circle class="node-here" cx="640" cy="235" r="15" fill="#fe640b"/>
      <text class="msg" x="640" y="285" text-anchor="middle" fill="#fe640b">степень</text>

      <!-- метка ветки feature-power (текущая, залита) + HEAD -->
      <rect x="668" y="223" width="190" height="25" rx="7" fill="#fe640b"/>
      <text class="blabel" x="681" y="241" fill="#fff">HEAD → feature-power</text>

      <!-- стрелка «★ вы здесь» к текущему коммиту -->
      <text class="here" x="640" y="180" text-anchor="middle">★ вы здесь</text>
      <path d="M640 188 L640 214" stroke="#fe640b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
      <defs>
        <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
          <path d="M0 0 L6 3 L0 6 Z" fill="#fe640b"/>
        </marker>
      </defs>
    </svg>
  </div>
</body>
</html>
