INHERIT: ../../mkdocs.base.yml

# ── Только то, что уникально для модуля ──
site_name: "От Git до Github"
site_url: https://talaev-sergey.github.io/mkdocs-test/

nav:
  - Главная: index.md
  - Подготовка к модулю: preparation.md
  - Уроки:
      # Замените образец реальными уроками: "- N урок: lessons/lesson_NN.md"
