      - 2 урок: lessons/lesson_02.md
      - Шаблон урока (образец): lessons/lesson_template.md
  - Домашняя работа: homework.md
  - Контрольная работа: test.md
  - Материалы урока: materials.md

# Локальные стили модуля (в дополнение к общему stylesheets/extra.css из темы)
extra_css:
  - stylesheets/extra.css
  - stylesheets/home-overrides.css
