<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Презентация урока</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* Палитра акцентов — зеркало docs/stylesheets/extra.css.
               Файл автономный (не видит переменные Material): держать в синхроне. */
            :root {
                --accent-orange: hsl(30, 70%, 65%);
                --accent-green: hsl(120, 35%, 58%);
                --accent-blue: hsl(210, 45%, 65%);
            }

            body {
                background: #0a0a0a;
                color: #e0e0e0;
                font-family: "Rubik", system-ui, sans-serif;
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            #progress-bar {
                position: fixed;
                top: 0;
                left: 0;
                height: 3px;
                background: var(--accent-green);
                width: 0;
                transition: width 0.35s ease;
                z-index: 10;
            }

            #lesson-header {
                width: 92%;
                max-width: 1280px;
                display: flex;
                align-items: center;
                justify-content: flex-start;
                gap: 0.6rem;
                font-size: 1.5rem;
                font-weight: 700;
                color: #4a4a4a;
                margin-bottom: 0.5rem;
                pointer-events: none;
                user-select: none;
            }
            #lesson-header .sep {
                color: #333;
            }

            #card {
                width: 92%;
                max-width: 1280px;
                min-height: 72vh;
                max-height: 84vh;
                background: #161616;
                border: 1px solid #2a2a2a;
                border-radius: 1rem;
                padding: 2.5rem 3rem;
                overflow-y: auto;
                opacity: 1;
                transition: opacity 0.2s ease;
                scrollbar-width: thin;
                scrollbar-color: #3a3a3a transparent;
            }
            #card.fade {
                opacity: 0;
            }

            /* ── Типографика слайдов ── */
            #slide-content h1 {
                color: var(--accent-orange);
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 1.25rem;
                line-height: 1.3;
            }
            #slide-content h2 {
                color: var(--accent-green);
                font-size: 1.5rem;
                font-weight: 600;
                border-left: 4px solid var(--accent-green);
                padding-left: 0.75rem;
                margin-bottom: 1rem;
                line-height: 1.3;
            }
            #slide-content h3 {
                color: var(--accent-blue);
                font-size: 1.15rem;
                font-weight: 500;
                margin: 1.25rem 0 0.5rem;
            }
            #slide-content h4 {
                color: #bbb;
                font-size: 1rem;
                font-weight: 500;
                margin: 1rem 0 0.4rem;
            }
            #slide-content p {
                line-height: 1.75;
                margin-bottom: 0.75rem;
            }
            #slide-content img {
                display: block;
                margin: 1rem auto;
                max-width: 100%;
                max-height: 60vh;
                width: auto;
                height: auto;
                object-fit: contain;
                border-radius: 0.5rem;
            }
            #slide-content ul,
            #slide-content ol {
                padding-left: 1.5rem;
                margin-bottom: 0.75rem;
            }
            #slide-content li {
                line-height: 1.65;
                margin-bottom: 0.2rem;
            }
            #slide-content table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 1rem;
                font-size: 0.92rem;
            }
            #slide-content th {
                background: #222;
                color: var(--accent-blue);
                padding: 0.5rem 0.75rem;
                border: 1px solid #333;
                text-align: left;
            }
            #slide-content td {
                padding: 0.45rem 0.75rem;
                border: 1px solid #2e2e2e;
            }
            #slide-content tr:nth-child(even) td {
                background: #1c1c1c;
            }
            #slide-content blockquote {
                border-left: 4px solid var(--accent-blue);
                background: rgba(100, 150, 200, 0.08);
                padding: 0.75rem 1rem;
                border-radius: 0 0.3rem 0.3rem 0;
                margin-bottom: 0.75rem;
                font-style: italic;
                color: #bbb;
            }
            #slide-content code {
                background: #222;
                padding: 0.1rem 0.4rem;
                border-radius: 0.25rem;
                font-size: 0.88em;
                font-family: "Fira Code", "Consolas", monospace;
                color: var(--accent-orange);
            }
            #slide-content pre {
                background: #1e1e1e;
                border: 1px solid #2e2e2e;
                padding: 1rem;
                border-radius: 0.5rem;
                overflow-x: auto;
                margin-bottom: 0.75rem;
            }
            #slide-content pre code {
                background: none;
                padding: 0;
                color: #ccc;
            }
            #slide-content hr {
                border: none;
                border-top: 1px solid #2a2a2a;
                margin: 1rem 0;
            }
            /* Чеклисты */
            #slide-content input[type="checkbox"] {
                margin-right: 0.4rem;
            }

            /* ── Пустой экран ── */
            #no-data {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                min-height: 30vh;
                color: #444;
                gap: 0.75rem;
            }
            #no-data span {
                font-size: 3rem;
            }
            #no-data p {
                font-size: 0.9rem;
            }

            /* ── Управление ── */
            #controls {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                margin-top: 1.25rem;
            }

            #slide-counter {
                color: #555;
                font-size: 0.85rem;
                min-width: 5rem;
                text-align: center;
                letter-spacing: 0.05em;
            }

            #hint {
                position: fixed;
                bottom: 1rem;
                right: 2rem;
                color: #555;
                font-size: 1rem;
            }
        </style>
    </head>
    <body>
        <div id="progress-bar"></div>
        <div id="lesson-header">
            <span id="header-module"></span>
            <span class="sep" id="header-sep" style="display: none">·</span>
            <span id="header-lesson"></span>
        </div>
        <div id="card">
            <div id="slide-content">
                <div id="no-data">
                    <span>📄</span>
                    <p>Запустите презентацию со страницы урока</p>
                </div>
            </div>
        </div>

        <div id="controls">
            <span id="slide-counter">— / —</span>
        </div>

        <p id="hint">← → для навигации · Esc для закрытия</p>

        <script>
            let slides = [];
            let current = 0;

            function showSlide(idx) {
                const card = document.getElementById("card");
                card.classList.add("fade");

                setTimeout(() => {
                    current = idx;
                    document.getElementById("slide-content").innerHTML =
                        slides[idx].html;
                    document.getElementById("slide-counter").textContent =
                        `${idx + 1} / ${slides.length}`;
                    document.getElementById("progress-bar").style.width =
                        `${((idx + 1) / slides.length) * 100}%`;
                    card.scrollTop = 0;
                    card.classList.remove("fade");
                }, 180);
            }

            function navigate(dir) {
                const next = current + dir;
                if (next >= 0 && next < slides.length) showSlide(next);
            }

            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight" || e.key === "ArrowDown")
                    navigate(1);
                if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigate(-1);
                if (e.key === "Escape") window.close();
            });

            // Swipe support
            let touchStartX = 0;
            document.addEventListener("touchstart", (e) => {
                touchStartX = e.touches[0].clientX;
            });
            document.addEventListener("touchend", (e) => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
            });

            (function init() {
                const raw = localStorage.getItem("lesson_slides");
                if (!raw) return;
                try {
                    slides = JSON.parse(raw);
                } catch (e) {
                    return;
                }
                if (!slides.length) return;

                const meta = JSON.parse(
                    localStorage.getItem("lesson_meta") || "{}",
                );
                if (meta.module)
                    document.getElementById("header-module").textContent =
                        meta.module;
                if (meta.lesson) {
                    document.getElementById("header-lesson").textContent =
                        meta.lesson;
                    if (meta.module)
                        document.getElementById("header-sep").style.display =
                            "";
                }

                showSlide(0);
            })();
        </script>
    </body>
</html>
