# ── Заменить перед деплоем ──────────────────────────────
site_name: "[Название модуля]"
site_url: https://talaev-sergey.github.io/mkdocs-test/
# ────────────────────────────────────────────────────────

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  language: ru
  font:
    text: Rubik
  features:
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - search.highlight
    - toc.follow

plugins:
  - search
  - meta

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Главная: index.md
  - Подготовка к модулю: preparation.md
  - Уроки:
      # Замените образец реальными уроками: "- N урок: lessons/lesson_NN.md"
      - Шаблон урока (образец): lessons/lesson_template.md
  - Домашняя работа: homework.md
  - Контрольная работа: test.md
  - Материалы урока: materials.md
